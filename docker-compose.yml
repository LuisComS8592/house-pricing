version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: house_pricing_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: house_pricing_api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MODEL_PATH=/app/models/pipeline_catboost_house_pricing.joblib
    volumes:
      - ./models:/app/models:ro
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: house_pricing_frontend
    restart: always
    environment:
      - API_URL=http://api:8000/predict
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:
